# 1. Database
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# 3. Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# 4. JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# 5. Sepay Payment Provider Configuration
sepay.bank-account=${SEPAY_BANK_ACCOUNT}
sepay.bank-code=${SEPAY_BANK_CODE}
sepay.account-name=${SEPAY_ACCOUNT_NAME}
sepay.webhook-api-key=${SEPAY_WEBHOOK_API_KEY}
# sepay.webhook-hmac-secret=${SEPAY_WEBHOOK_HMAC_SECRET}
sepay.invoice-expiration-minutes=${SEPAY_INVOICE_EXPIRATION_MINUTES}